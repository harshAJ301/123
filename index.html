<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>✨ Magical Birthday Experience ✨</title>
    
    <!-- ============================================
    EXTERNAL LIBRARIES (CDN)
    ============================================ -->
    <!-- Three.js - 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    
    <!-- GSAP - Premium Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js">
    </script>
    
    <!-- MediaPipe - Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js">
    </script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ============================================
    OVERLAY UI ELEMENTS
    ============================================ -->
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="sparkle"></div>
        </div>
        <p class="loading-text">✨ Preparing Magic...</p>
    </div>

    <!-- Main Canvas Container -->
    <div id="app">
        <!-- Three.js will render here -->
        <canvas id="three-canvas"></canvas>
        
        <!-- MediaPipe Canvas (overlay for hand tracking) -->
        <canvas id="hand-canvas"></canvas>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div class="brand">
                <span class="icon">🎂</span>
                <span class="title">Birthday Magic</span>
            </div>
            
            <div class="instructions">
                <div class="instruction-step" id="step-1">
                    <span class="icon">👋</span>
                    <span>Show your hand to the camera</span>
                </div>
                <div class="instruction-step" id="step-2">
                    <span class="icon">🤏</span>
                    <span>Pinch to plant a seed</span>
                </div>
                <div class="instruction-step" id="step-3">
                    <span class="icon">🦋</span>
                    <span>Wave to attract butterflies</span>
                </div>
            </div>
            
            <div class="status-bar">
                <div class="status-item">
                    <span class="label">Seeds</span>
                    <span class="value" id="seed-count">0</span>
                </div>
                <div class="status-item">
                    <span class="label">Flowers</span>
                    <span class="value" id="flower-count">0</span>
                </div>
                <div class="status-item">
                    <span class="label">Butterflies</span>
                    <span class="value" id="butterfly-count">0</span>
                </div>
            </div>
            
            <div class="action-hint" id="action-hint">
                🌱 Pinch to plant a seed!
            </div>
        </div>
    </div>

    <!-- ============================================
    JAVASCRIPT - MAIN APPLICATION
    ============================================ -->
    <script src="script.js"></script>
</body>
</html>
